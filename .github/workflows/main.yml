# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle
permissions: write-all

on:
  workflow_dispatch:
  release:
    types: [ published ]
jobs:
  build:

    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Configure Gradle for optimal use in GiHub Actions, including caching of downloaded dependencies.
      # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
      - name: Make Gradle Executable
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle Wrapper
        run: ./gradlew clean shadowJar

      - name: Resolve release artifact
        id: artifact
        shell: bash
        run: |
          FILE="$(find build/libs -maxdepth 1 -type f -name 'CoreProtectTimeLapse-*-all.jar' | head -n 1)"
          test -f "$FILE"
          echo "file=$FILE" >> "$GITHUB_OUTPUT"

      # An optional step to also upload the `.jar` to the GitHub release assets
      - name: Upload to release
        if: github.event_name == 'release'
        uses: JasonEtco/upload-to-release@master
        with:
          # Make sure that this matches the file name of your .jar
          args: ${{ steps.artifact.outputs.file }} application/java-archive
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'

      - name: Upload to Modrinth
        if: github.event_name == 'release'
        uses: cloudnode-pro/modrinth-publish@1.0.0
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: 64UYguZE
          file: ${{ steps.artifact.outputs.file }}
          changelog: ${{ github.event.release.body }}
          loaders: paper, spigot
          api-domain: api.modrinth.com

      - name: "Upload to CurseForge"
        if: github.event_name == 'release'
        uses: itsmeow/curseforge-upload@v3
        with:
          file_path: "${{ steps.artifact.outputs.file }}"
          game_endpoint: "bukkit"
          relations: "coreprotect:requiredDependency"
          game_versions: "Minecraft 1.21.4,Java 21,Bukkit"
          project_id: "1010725"
          changelog: ${{ github.event.release.body }}
          changelog_type: markdown
          token: "${{ secrets.CURSEFORGE_TOKEN }}"
